    <script>
    function bukaPabrik(lat, lon) {
        // Mencari objek map buatan Folium di layar
        var maps = Object.keys(window).filter(function(k) { return k.startsWith('map_'); });
        if (maps.length === 0) return;
        var myMap = window[maps[0]];

        // Cari marker yang sesuai dengan koordinat target
        myMap.eachLayer(function(layer) {
            if (layer instanceof L.Marker) {
                var ll = layer.getLatLng();
                // Toleransi koma desimal agar akurat
                if (ll && Math.abs(ll.lat - lat) < 0.000001 && Math.abs(ll.lng - lon) < 0.000001) {
                    myMap.flyTo([lat, lon], 16, {duration: 1.0}); // Animasi terbang
                    setTimeout(function() { layer.openPopup(); }, 1200); // Buka popup setelah sampai
                }
            }
        });
    }
    </script>
