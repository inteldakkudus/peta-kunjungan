    <style>
    /* Efek Animasi Menyala (Glowing) Biru untuk Ikon Polisi */
    .glowing-police {
        font-size: 22px;
        background: #ffffff;
        border: 2px solid #007bff;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 12px 6px rgba(0, 123, 255, 0.7);
        animation: pulse-blue 1.5s infinite;
    }
    @keyframes pulse-blue {
        0% { box-shadow: 0 0 12px 6px rgba(0, 123, 255, 0.8); }
        50% { box-shadow: 0 0 25px 12px rgba(0, 123, 255, 0.3); }
        100% { box-shadow: 0 0 12px 6px rgba(0, 123, 255, 0.8); }
    }
    </style>

    <script>
    // 1. Fungsi Klik "Next Pabrik" (Lompat)
    function bukaPabrik(lat, lon) {
        var maps = Object.keys(window).filter(function(k) { return k.startsWith('map_'); });
        if (maps.length === 0) return;
        var myMap = window[maps[0]];

        myMap.eachLayer(function(layer) {
            if (layer instanceof L.Marker) {
                var ll = layer.getLatLng();
                if (ll && Math.abs(ll.lat - lat) < 0.000001 && Math.abs(ll.lng - lon) < 0.000001) {
                    myMap.flyTo([lat, lon], 16, {duration: 1.0}); 
                    setTimeout(function() { layer.openPopup(); }, 1200); 
                }
            }
        });
    }

    // 2. Fungsi Eksekusi Live Tracking & Auto Refresh
    document.addEventListener("DOMContentLoaded", function() {
        var maps = Object.keys(window).filter(function(k) { return k.startsWith('map_'); });
        if (maps.length === 0) return;
        var myMap = window[maps[0]];

        // Persiapan Ikon Polisi
        var userMarker = null;
        var userIcon = L.divIcon({
            html: "<div class='glowing-police'>👮🏻‍♂️</div>",
            className: "empty",
            iconSize: [36, 36],
            iconAnchor: [18, 18] // Agar titik jangkar pas di tengah
        });

        // Meminta Akses GPS
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(position) {
                var lat = position.coords.latitude;
                var lng = position.coords.longitude;

                if (!userMarker) {
                    // Pertama kali diizinkan: Buat marker & Terbang ke lokasi tim
                    userMarker = L.marker([lat, lng], {icon: userIcon, zIndexOffset: 1000}).addTo(myMap);
                    userMarker.bindPopup("<b style='color:#007bff;'>📍 Posisi Anda Saat Ini</b>").openPopup();
                    myMap.flyTo([lat, lng], 15, {duration: 2.0}); 
                } else {
                    // Update pergerakan titik lokasi
                    userMarker.setLatLng([lat, lng]);
                }
            }, function(error) {
                console.warn("Akses lokasi ditolak atau error: ", error.message);
            }, {
                enableHighAccuracy: true, 
                maximumAge: 10000,
                timeout: 5000
            });
        }

        // Fitur Auto-Refresh saat HP di-minimize lalu dibuka lagi
        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'visible') {
                setTimeout(function() {
                    location.reload();
                }, 500); // Refresh halaman
            }
        });
    });
    </script>
